name: Build APK Rubik
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgdbm-dev bluez libasound2-dev bsdmainutils

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36 virtualenv

      - name: Build APK with Buildozer
        run: |
          buildozer android debug
        env:
          ACCEPT_FDL_LICENSE: "y"

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Rubik-APK
          path: bin/*.apk

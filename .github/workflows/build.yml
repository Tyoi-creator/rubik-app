name: Build APK with Buildozer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          git \
          libffi-dev \
          libssl-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libsqlite3-dev \
          sqlite3 \
          bzip2 \
          libbz2-dev \
          zlib1g-dev \
          openssl \
          libgdbm-dev \
          libgdbm-compat-dev \
          liblzma-dev \
          libreadline-dev \
          uuid-dev \
          libncurses5-dev \
          libncursesw5-dev \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          pkg-config \
          ant \
          openjdk-17-jdk

    - name: Install Python build tools and Fix Cython
      run: |
        python -m pip install --upgrade pip
        # Cài đặt phiên bản Cython < 3.0.0 để tránh lỗi biên dịch module pyjnius
        pip install "Cython<3.0.0" wheel buildozer

    - name: Build APK with Buildozer
      env:
        # Chấp nhận thiết kế mới của Kivy nếu Buildozer yêu cầu
        BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
      run: |
        # 1. Chấp nhận các điều khoản bản quyền SDK hệ thống trước
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # 2. Xóa các thư mục build dở dang/bị lỗi của pyjnius từ các lần chạy trước (nếu có cache)
        rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/other_builds/pyjnius*
        
        # 3. Tiến hành tự động đồng ý bản quyền và thực hiện build APK
        yes y | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: network-apk
        path: bin/*.apk

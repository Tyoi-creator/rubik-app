name: Build APK with Buildozer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          git \
          libffi-dev \
          libssl-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libsqlite3-dev \
          sqlite3 \
          bzip2 \
          libbz2-dev \
          zlib1g-dev \
          openssl \
          libgdbm-dev \
          libgdbm-compat-dev \
          liblzma-dev \
          libreadline-dev \
          uuid-dev \
          libncurses5-dev \
          libncursesw5-dev \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          pkg-config \
          ant \
          openjdk-17-jdk

    - name: Install Python build tools
      run: |
        python -m pip install --upgrade pip
        pip install "Cython<3.0.0" wheel buildozer

    - name: Build APK with Buildozer
      env:
        BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
      run: |
        # 1. Chấp nhận các điều khoản bản quyền SDK hệ thống
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # 2. Khởi tạo cấu hình nền tảng của Buildozer trước để tạo thư mục
        buildozer android venv || true
        
        # 3. Ép buộc môi trường ảo nội bộ của Buildozer phải sử dụng Cython cũ nhằm tránh lỗi jnius
        # (Đây là bước cốt lõi để sửa lỗi 'jnius' is not a valid module name)
        if [ -d "~/.buildozer/android/platform/venv" ]; then
          ~/.buildozer/android/platform/venv/bin/pip install "Cython<3.0.0"
        fi
        
        # 4. Xóa sạch cache lỗi cũ của pyjnius để hệ thống biên dịch lại từ đầu sạch sẽ
        rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/other_builds/pyjnius*
        
        # 5. Tiến hành tự động đồng ý bản quyền và thực hiện build APK
        yes y | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: network-apk
        path: bin/*.apk

name: Build APK with Buildozer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libunwind-dev
        sudo apt-get install -y \
          build-essential \
          git \
          ccache \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          m4 \
          pkg-config \
          libffi-dev \
          libssl-dev \
          libsqlite3-dev \
          sqlite3 \
          bzip2 \
          libbz2-dev \
          zlib1g-dev \
          openssl \
          libgdbm-dev \
          libgdbm-compat-dev \
          liblzma-dev \
          libreadline-dev \
          uuid-dev \
          libncurses5-dev \
          libncursesw5-dev \
          unzip \
          zip \
          ant \
          openjdk-17-jdk

    - name: Install Python Build Tools
      run: |
        python -m pip install --upgrade pip
        # Khóa phiên bản Cython phù hợp với Python 3.11 và Kivy
        pip install "Cython>=0.29.33,<3.0.0" wheel buildozer

    - name: Total Clean Cache & Build Package
      env:
        BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
      run: |
        # 1. Chấp nhận các điều khoản bản quyền Android SDK
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # 2. Xóa sạch mọi tàn dư xung đột phiên bản cũ
        rm -rf .buildozer/
        rm -rf ~/.buildozer/
        rm -rf ./buildozer
        rm -rf ~/.local/share/buildozer
        
        # 3. Kích hoạt lệnh build sạch hoàn toàn
        yes y | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: network-apk
        path: bin/*.apk

name: Build APK Rubik

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgdbm-dev bluez libasound2-dev bsdmainutils

    - name: Install Buildozer and Cython
      run: |
        python -m pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.36 virtualenv

    - name: Build APK with Buildozer
      run: |
        # Tuyệt chiêu: Tạo sẵn thư mục licenses ảo ở mọi nơi mà Buildozer có thể sờ tới
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n247c16e652354367b58838960428d54511779746" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        
        # Đút thẳng lệnh "yes" vào mồm Buildozer khi nó chạy ngầm
        # Điều này giúp tự động nhấn Y nếu có bất kỳ bảng điều khoản nào hiện lên giữa chừng
        yes y | buildozer android debug
      env:
        ACCEPT_FDL_LICENSE: "y"
        GRADLE_OPTS: "-Dorg.gradle.welcome.provider.enabled=false"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Rubik-APK
        path: "**/bin/*.apk"

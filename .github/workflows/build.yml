name: Build APK Rubik

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        # Cài thêm gói 'expect' để ép tự động nhấn Y ở mọi tình huống ngầm
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgdbm-dev bluez libasound2-dev bsdmainutils expect

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.36 virtualenv

    - name: Build APK with Buildozer
      run: |
        # Dùng lệnh expect để tạo một vòng lặp tự động điền "y" và nhấn Enter bất cứ khi nào hệ thống đòi hỏi điều khoản bản quyền
        expect -c "
        set timeout -1
        spawn buildozer android debug
        expect {
            \"*Accept? (y/N)*\" { send \"y\r\"; exp_continue }
            \"*Is this correct?*\" { send \"y\r\"; exp_continue }
            eof
        }
        "
      env:
        ACCEPT_FDL_LICENSE: "y"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Rubik-APK
        path: "**/bin/*.apk"

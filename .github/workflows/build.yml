name: Build APK Rubik

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgdbm-dev bluez libasound2-dev bsdmainutils

    - name: Install Latest Buildozer and Cython
      run: |
        python -m pip install --upgrade pip
        pip install buildozer==1.6.0 cython==0.29.36 virtualenv

    - name: Build APK with Buildozer
      run: |
        # Chấp nhận tất cả bản quyền của Android SDK hệ thống gốc trước
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # Di chuyển vào đúng thư mục chứa mã nguồn (nơi có file main.py và buildozer.spec)
        # Lệnh này giúp khắc phục triệt để lỗi "No buildozer.spec found"
        cd $GITHUB_WORKSPACE
        
        # Đút lệnh yes vào để tự động bấm Y nếu có cài thêm package gì
        yes y | buildozer android debug
      env:
        ACCEPT_FDL_LICENSE: "y"
        GRADLE_OPTS: "-Dorg.gradle.welcome.provider.enabled=false"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Rubik-APK
        path: "**/bin/*.apk"

name: Build APK with Buildozer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    # Sử dụng Ubuntu 22.04 LTS để đảm bảo các công cụ autoconf/libtool tương thích tuyệt đối với NDK
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies & Fix Autoconf Path
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ccache \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          m4 \
          pkg-config \
          libffi-dev \
          libssl-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libsqlite3-dev \
          sqlite3 \
          bzip2 \
          libbz2-dev \
          zlib1g-dev \
          openssl \
          libgdbm-dev \
          libgdbm-compat-dev \
          liblzma-dev \
          libreadline-dev \
          uuid-dev \
          libncurses5-dev \
          libncursesw5-dev \
          unzip \
          zip \
          ant \
          openjdk-17-jdk

        # Chuẩn hóa đường dẫn macro: Ép buộc autoconf nhận diện chính xác libtool m4
        sudo ln -s /usr/share/aclocal/libtool.m4 /usr/share/aclocal/ltoptions.m4 /usr/share/aclocal/ltsugar.m4 /usr/share/aclocal/ltversion.m4 /usr/share/aclocal/lt~obsolete.m4 /usr/include/ || true

    - name: Install Python Build Tools
      run: |
        python -m pip install --upgrade pip
        pip install "Cython<3.0.0" wheel buildozer

    - name: Clean Cache and Build Android Package
      env:
        BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
      run: |
        # 1. Chấp nhận các điều khoản bản quyền Android SDK
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # 2. Xóa sạch hoàn toàn các thư mục đệm lỗi lưu trữ cục bộ từ các lần build trước
        rm -rf .buildozer/
        rm -rf ~/.buildozer/
        
        # 3. Kích hoạt Buildozer biên dịch ứng dụng sạch (Clean Build)
        yes y | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: network-apk
        path: bin/*.apk

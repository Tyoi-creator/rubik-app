name: Build APK Rubik

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgdbm-dev bluez libasound2-dev bsdmainutils lld libtinfo5 g++

    - name: Install Latest Buildozer and Modern Cython
      run: |
        python -m pip install --upgrade pip
        # Cài đặt phiên bản Cython mới để tương thích hoàn toàn cấu trúc hàm hệ thống
        pip install buildozer==1.6.0 cython virtualenv

    - name: Build APK with Buildozer
      run: |
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        cd $GITHUB_WORKSPACE
        yes y | buildozer android debug
      env:
        ACCEPT_FDL_LICENSE: "y"
        GRADLE_OPTS: "-Dorg.gradle.welcome.provider.enabled=false"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Rubik-APK
        path: "**/bin/*.apk"

name: Build APK Rubik

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgdbm-dev bluez libasound2-dev bsdmainutils

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.36 virtualenv

    - name: Build APK with Buildozer
      run: |
        # 1. Tạo sẵn cấu trúc thư mục để đánh lừa Buildozer
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
        
        # 2. Tạo sẵn chìa khóa bản quyền của Google
        echo -e "\n247c16e652354367b58838960428d54511779746" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        
        # 3. Tạo liên kết ảo (Symlink) giải quyết triệt để lỗi "sdkmanager does not exist"
        ln -s /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        
        # Tiến hành đóng gói ứng dụng
        buildozer android debug
      env:
        ACCEPT_FDL_LICENSE: "y"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Rubik-APK
        path: bin/*.apk
